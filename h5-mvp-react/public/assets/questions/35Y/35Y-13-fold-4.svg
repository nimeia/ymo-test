  <rect x="40" y="330" width="868" height="60" rx="18" class="callout-ok" />
  <text x="58" y="368" class="callout-icon">✓</text>
  <text x="94" y="368" class="callout-text">这题真正要看的是连接点，而不是看起来“像不像一条长蛇”。</text>
</svg>