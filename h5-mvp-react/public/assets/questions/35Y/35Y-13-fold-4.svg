<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="408" viewBox="0 0 980 408" role="img" aria-labelledby="title desc">
  <title id="title">图4：长一点不等于会撞面</title>
  <desc id="desc">上排3格和下排3格虽然拉长，但因为连接位置错开，折起后方向仍然各不相同。 这题真正要看的是连接点，而不是看起来“像不像一条长蛇”。</desc>
  <defs>
    <marker id="arrowHead" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4d6fff" />
    </marker>
  </defs>
  <style>
    .bg { fill: #f8fbff; }
    .panel { fill: #ffffff; stroke: #dbe6ff; stroke-width: 2; }
    .title-main { font: 700 28px 'Arial', sans-serif; fill: #18305b; }
    .title-sub { font: 400 16px 'Arial', sans-serif; fill: #4b628c; }
    .panel-title { font: 700 18px 'Arial', sans-serif; fill: #24416f; }
    .cell-base { fill: #edf3ff; stroke: #5577c8; stroke-width: 2.2; }
    .cell-center { fill: #d8e6ff; stroke: #2e5bc4; stroke-width: 2.6; }
    .cell-final { fill: #fff2da; stroke: #d28b1f; stroke-width: 2.2; }
    .cell-hidden { fill: #f4f6fb; stroke: #b6c0d7; stroke-width: 2; stroke-dasharray: 7 6; }
    .cell-id { font: 700 18px 'Arial', sans-serif; fill: #1f355d; }
    .guide-line { stroke: #86a3ff; stroke-width: 2.5; stroke-dasharray: 6 6; opacity: 0.9; }
    .slot-base { fill: #f2f6ff; stroke: #c8d8ff; stroke-width: 2; }
    .slot-collision { fill: #fff0ef; stroke: #e56b64; stroke-width: 2.6; }
    .slot-label { font: 700 14px 'Arial', sans-serif; fill: #567; }
    .slot-value { font: 700 17px 'Arial', sans-serif; fill: #1d3258; }
    .callout-ok { fill: #eef9f1; stroke: #7bc38f; stroke-width: 1.8; }
    .callout-warn { fill: #fff5f3; stroke: #f1a497; stroke-width: 1.8; }
    .callout-icon { font: 700 20px 'Arial', sans-serif; fill: #1f355d; }
    .callout-text { font: 400 16px 'Arial', sans-serif; fill: #2f4568; }
  </style>
  <rect width="980" height="408" class="bg" rx="28" />
  <rect x="40" y="78" width="420" height="242" rx="24" class="panel" />
  <rect x="488" y="78" width="420" height="242" rx="24" class="panel" />
  <text x="40" y="24" class="title-main">图4：长一点不等于会撞面</text><text x="40" y="50" class="title-sub">上排3格和下排3格虽然拉长，但因为连接位置错开，折起后方向仍然各不相同。</text><text x="58" y="100" class="panel-title">展开图</text><text x="506" y="100" class="panel-title">折后方向</text>
  <rect x="130" y="157" width="48" height="48" rx="12" class="cell-base" /><text x="154" y="187" text-anchor="middle" class="cell-id">1</text><rect x="178" y="157" width="48" height="48" rx="12" class="cell-base" /><text x="202" y="187" text-anchor="middle" class="cell-id">2</text><rect x="226" y="157" width="48" height="48" rx="12" class="cell-center" /><text x="250" y="187" text-anchor="middle" class="cell-id">3</text><rect x="226" y="205" width="48" height="48" rx="12" class="cell-base" /><text x="250" y="235" text-anchor="middle" class="cell-id">4</text><rect x="274" y="205" width="48" height="48" rx="12" class="cell-base" /><text x="298" y="235" text-anchor="middle" class="cell-id">5</text><rect x="322" y="205" width="48" height="48" rx="12" class="cell-base" /><text x="346" y="235" text-anchor="middle" class="cell-id">6</text>
  <line x1="154" y1="181" x2="202" y2="181" class="guide-line" marker-end="url(#arrowHead)" /><line x1="202" y1="181" x2="250" y2="181" class="guide-line" marker-end="url(#arrowHead)" /><line x1="250" y1="181" x2="250" y2="229" class="guide-line" marker-end="url(#arrowHead)" /><line x1="250" y1="229" x2="298" y2="229" class="guide-line" marker-end="url(#arrowHead)" /><line x1="298" y1="229" x2="346" y2="229" class="guide-line" marker-end="url(#arrowHead)" />
